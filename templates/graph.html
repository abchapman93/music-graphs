{% extends "base.html" %}

{% block title %}{{ name }} — music graphs{% endblock %}
{% block body_class %}graph-page{% endblock %}

{% block content %}
<section class="graph-shell">
  <header class="graph-shell-header">
    <h2>{{ name }}</h2>
    {% if description %}<p class="muted">{{ description }}</p>{% endif %}
  </header>
  <div class="graph-stage" id="graph-stage">
    <aside id="directory-panel" aria-label="Card directory">
      <div class="panel-content" id="directory-panel-content">
        <p class="muted directory-empty">Loading…</p>
      </div>
      <div class="panel-resize-handle" data-resize="left" aria-hidden="true"></div>
      <button class="panel-collapse-btn" data-collapse="left" type="button"
              aria-label="Collapse directory panel" title="Collapse directory">◀</button>
    </aside>
    <button class="panel-expand-btn" data-expand="left" type="button"
            aria-label="Expand directory panel" title="Show directory">▶</button>
    <div class="graph-canvas-wrap">
      <div class="graph-searchbar">
        <input id="search-input" type="search" autocomplete="off"
               placeholder="Search nodes…" aria-label="Search nodes">
        <div id="search-results" role="listbox" aria-label="Search results"></div>
      </div>
      <div id="graph"></div>
      <div class="graph-controls" role="toolbar" aria-label="Graph controls">
        <button id="zoom-in" type="button" class="gc-btn" aria-label="Zoom in" title="Zoom in">+</button>
        <button id="zoom-out" type="button" class="gc-btn" aria-label="Zoom out" title="Zoom out">−</button>
        <button id="zoom-fit" type="button" class="gc-btn" aria-label="Fit to screen" title="Fit to screen">⤢</button>
        <label class="gc-toggle" title="Pause physics simulation">
          <input type="checkbox" id="freeze-toggle" checked>
          <span>Frozen</span>
        </label>
      </div>
    </div>
    <button class="panel-expand-btn" data-expand="right" type="button"
            aria-label="Expand details panel" title="Show details">◀</button>
    <aside id="card-panel" aria-label="Card details">
      <div class="panel-resize-handle" data-resize="right" aria-hidden="true"></div>
      <button class="panel-collapse-btn" data-collapse="right" type="button"
              aria-label="Collapse details panel" title="Collapse details">▶</button>
      <div class="panel-content" id="card-panel-content">
        <p class="muted">Click a node to see details.</p>
      </div>
    </aside>
  </div>
</section>

<div id="note-modal" class="note-modal" hidden aria-hidden="true" role="dialog" aria-label="Create note">
  <div class="note-modal-backdrop" data-note-cancel></div>
  <div class="note-modal-dialog" role="document">
    <h3 class="note-modal-title">Add a note</h3>
    <p class="note-modal-source muted" data-note-source></p>
    <div class="note-modal-error" data-note-error hidden></div>
    <div class="note-modal-field">
      <fieldset class="note-modal-types">
        <legend>Type</legend>
        <label><input type="radio" name="note-type" value="note" checked> Note</label>
        <label><input type="radio" name="note-type" value="memory"> Memory</label>
      </fieldset>
    </div>
    <div class="note-modal-field">
      <label for="note-title">Title</label>
      <input id="note-title" type="text" data-note-title autocomplete="off" maxlength="200">
    </div>
    <div class="note-modal-field">
      <label for="note-body">Body (markdown)</label>
      <textarea id="note-body" data-note-body rows="6" spellcheck="false"></textarea>
    </div>
    <div class="note-modal-actions">
      <button type="button" class="note-modal-create" data-note-create>Create</button>
      <button type="button" class="note-modal-cancel" data-note-cancel>Cancel</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<script>
  window.GRAPH_SLUG = "{{ slug }}";
</script>
<script src="/static/js/graph.js"></script>
{% endblock %}
